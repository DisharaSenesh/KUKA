# ====================================================================
# Offline Reconstruction Pipeline Configuration
# ====================================================================
# Usage:  python3 offline_run.py [config.yaml]
# ====================================================================

# Pipeline mode: "offline" = CSV replay,  "online" = live camera + robot
mode: "offline"

# ===== Input / Output =====
input:
  csv_path: "T2_141237_linear_ovr1.csv"

output:
  results_json: "T2_results.json"
  plots_png: "T2_plots.png"

# ===== Camera Intrinsics =====
# (→ CameraIntrinsics in core/sensing/camera/intrinsics.py)
camera:
  fx: 1486.4123717271
  fy: 1488.6919876408
  cx: 639.5371967339
  cy: 431.7580771817
  width: 1280
  height: 960
  # Distortion: k1, k2, p1, p2, k3 — OpenCV radial-tangential convention
  distortion: [0.047240116965482692, 0.7685733181554426, 0.0005221055479888955, 0.0041421931791450536, -2.9566144231226019]
  # Video source for online mode (integer → /dev/videoN, string → file path)
  source: 2

# ===== KUKA Robot Connection (online mode only) =====
# (→ KukaDriver in core/robotics/drivers/kuka_driver.py)
robot:
  ip: "172.31.1.147"
  port: 7000

# ===== Hand-Eye Calibration =====
# (→ TCPConfig in core/robotics/kinematics/tcp.py)
# Transform: flange → camera. Camera is rigidly mounted on robot end-effector.
# Euler angles follow KUKA ABC convention (intrinsic Z-Y-X).
hand_eye:
  # Rotation angles in degrees (Rx @ Ry @ Rz order, matching reference)
  rx_deg: 1.1239692871      # rotation about X (degrees)
  ry_deg: -3.7506525776     # rotation about Y (degrees)
  rz_deg: -87.6023477856    # rotation about Z (degrees)
  # Translation in mm
  tx_mm: 13.1335163602      # camera X position in flange frame (mm)
  ty_mm: -8.5332482353      # camera Y position in flange frame (mm)
  tz_mm: -89.7669585601     # camera Z position in flange frame (mm)


# ===== Sliding Window =====
window:
  min_size: 5                # reject reconstruction below this
  max_size: 30               # evict oldest measurements above this

# ===== Reconstruction / Model Selection =====
model:
  min_poly_order: 1
  max_poly_order: 1
  complexity_penalty: 0.25    # λ — higher = favours simpler trajectories
  use_weighted: false         # weight measurements by inverse sync error

# ===== Filtering — Ray Angle Gate =====
ray_angle:
  min_angle_deg: 1.0          # minimum angular separation between ray directions

# ===== Filtering — Camera Baseline Gate =====
baseline:
  min_distance_m: 0.0        # minimum camera baseline for parallax

# ===== Filtering — Time Sync Gate =====
sync:
  max_error_s: 0.0            # max acceptable temporal sync error

# ===== Filtering — Observability Gate =====
observability:
  enabled: true                # run full observability check on each accept
  gate_max_measurements: 100   # max measurements retained in the gate

# ===== Plotting =====
plots:
  enabled: true
  dpi: 150
  figure_width: 16
  figure_height: 14